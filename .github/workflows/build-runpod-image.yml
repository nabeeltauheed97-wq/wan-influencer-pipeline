name: Build RunPod image

on:
  push:
    branches: [main]
    paths:
      - 'runpod/**'
      - 'workflows/wan22_animate_16gb.json'
      - 'workflows/wan22_animate_chunked.json'
      - 'workflows/ltx23_pose.json'
      - 'requirements.txt'
      - '.github/workflows/build-runpod-image.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        include:
          # Wan 2.2-Animate (original track). The `latest` tag keeps the
          # historical default pointing at this image so existing pod
          # references and runpod/README.md instructions don't break.
          - name: wan22
            dockerfile: runpod/Dockerfile
            tag_suffix: wan22
            extra_tags: |
              type=raw,value=latest,enable={{is_default_branch}}
          # LTX-2.3 parallel track. Same image name, different tag. No
          # `latest` here — users opt in explicitly via the `:ltx23` tag.
          - name: ltx23
            dockerfile: runpod/Dockerfile.ltx23
            tag_suffix: ltx23
            extra_tags: ''

    steps:
      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase repo owner
        id: ns
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.ns.outputs.owner_lc }}/wan-influencer-pipeline
          tags: |
            type=raw,value=${{ matrix.tag_suffix }},enable={{is_default_branch}}
            type=sha,format=short,suffix=-${{ matrix.tag_suffix }}
            ${{ matrix.extra_tags }}

      - name: Build and push image (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
